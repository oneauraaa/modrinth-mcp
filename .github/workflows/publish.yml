name: Publish to npm

# Publishes when a version tag (v1.2.3) is pushed, or manually via the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing needs a recent npm; the bundled one may be too old.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm publish
